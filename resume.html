<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sruthi Korlakunta - Resume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root {
            --bg-cream: #F8F4EF;
            --text-black: #110F0D;
            --accent-cyan: #3C9DB8;
            --accent-rust: #965D37;
            --glass-bg: rgba(248, 244, 239, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-cream);
            color: var(--text-black);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            font-size: 1.05rem;
            line-height: 1.6;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            opacity: 0.6;
        }

        h1, h2, h3, h4 {
            font-family: 'Poiret One', cursive;
            font-weight: 600;
            color: var(--text-black);
            letter-spacing: -0.02em;
        }

        .font-serif-custom {
            font-family: 'Poiret One', cursive;
        }

        .glass-nav {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .text-cyan { color: var(--accent-cyan); }
        .text-rust { color: var(--accent-rust); }

        .link-hover {
            color: var(--text-black);
            text-decoration: none;
            transition: color 0.3s ease;
            position: relative;
            font-weight: 500;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .link-hover::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -4px;
            left: 0;
            background-color: var(--accent-cyan);
            transition: width 0.3s ease;
        }
        .link-hover:hover::after, .active-link::after {
            width: 100%;
        }
        .active-link {
            color: var(--accent-cyan);
        }

        .blob {
            position: absolute;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.4;
            animation: moveBlob 20s infinite alternate ease-in-out;
            border-radius: 50%;
        }
        .blob-1 { top: 20%; left: 20%; width: 40vw; height: 40vw; background: var(--accent-cyan); }
        .blob-2 { bottom: 10%; right: 10%; width: 50vw; height: 50vw; background: var(--accent-rust); }

        @keyframes moveBlob {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-10%, -10%) scale(1.1); }
        }

        .artistic-shape {
            position: absolute;
            z-index: 0;
            opacity: 0.3;
            pointer-events: none;
            animation: floatSlow 20s infinite alternate ease-in-out;
        }
        
        .shape-1 { top: 15%; right: 15%; animation-delay: -5s; }
        .shape-2 { bottom: 25%; left: 10%; animation-duration: 25s; }
        .shape-3 { top: 50%; right: 5%; animation-duration: 30s; }

        @keyframes floatSlow {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-30px) rotate(15deg); }
        }

        .gsap-reveal {
            opacity: 0;
            transform: translateY(40px);
        }
        
        .btn-primary {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: var(--text-black);
            color: var(--bg-cream);
            border-radius: 30px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.85rem;
        }
        .btn-primary:hover {
            background: var(--accent-cyan);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(60, 157, 184, 0.2);
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <img src="data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0 L60 40 L100 50 L60 60 L50 100 L40 60 L0 50 L40 40 Z' fill='%23965D37' opacity='0.5'/%3E%3C/svg%3E" class="artistic-shape shape-1" alt="">
    <img src="data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='60' cy='60' r='50' fill='none' stroke='%233C9DB8' stroke-width='2' stroke-dasharray='10 5'/%3E%3Ccircle cx='60' cy='60' r='30' fill='none' stroke='%233C9DB8' stroke-width='1'/%3E%3C/svg%3E" class="artistic-shape shape-2" alt="">
    <img src="data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='20' y='20' width='60' height='60' fill='none' stroke='%23110F0D' stroke-width='2' transform='rotate(45 50 50)'/%3E%3Crect x='30' y='30' width='40' height='40' fill='none' stroke='%23110F0D' stroke-width='1' transform='rotate(45 50 50)'/%3E%3C/svg%3E" class="artistic-shape shape-3" alt="">

    <nav class="glass-nav py-4 px-6 md:px-12 flex flex-col md:flex-row justify-between items-center mb-12">
        <h1 class="text-3xl md:text-4xl lg:text-5xl font-serif-custom font-bold m-0 text-black tracking-tight"><a href="index.html">Sruthi Korlakunta</a></h1>
        <div class="flex flex-wrap justify-center gap-6 mt-4 md:mt-0">
            <a href="index.html" class="link-hover">Home</a>
            <a href="summary.html" class="link-hover">Summary</a>
            <a href="resume.html" class="link-hover active-link">Resume</a>
            <a href="blog.html" class="link-hover">Blog</a>
            <a href="contact.html" class="link-hover">Contact</a>
            <a href="knowledgeDB/index.html" class="link-hover">Sruthi AI</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 md:px-12 w-full flex-grow flex flex-col justify-center mb-20">
        
        <div class="glass-card p-6 md:p-10 text-center gsap-reveal flex-grow flex flex-col h-[75vh]">
            <h2 class="text-4xl md:text-5xl font-serif-custom mb-6 font-bold text-rust">Resume</h2>
            <div class="flex-grow w-full rounded-2xl overflow-hidden border border-white/60 shadow-inner bg-white/40 backdrop-blur-sm mb-6">
                <iframe src="assets/Resume_sKorlakunta.docx.pdf" class="w-full h-full min-h-[50vh]"></iframe>
            </div>
            <div>
                <a href="assets/Resume_sKorlakunta.docx.pdf" download class="btn-primary">Download PDF</a>
            </div>
        </div>

    </main>

    <script>
        gsap.registerPlugin(ScrollTrigger);
        gsap.to('.gsap-reveal', {
            opacity: 1,
            y: 0,
            duration: 1,
            ease: "power3.out"
        });
    </script>
</body>
</html>
